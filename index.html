<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>VSR構成図ジェネレーター</title>

<script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

<style>
  body { margin:0; font-family:Arial, sans-serif; background:#f4f6f8; }
  .wrap { display:flex; height:100vh; }
  .form { width:360px; padding:20px; background:#fff; overflow:auto; box-shadow:2px 0 8px #ccc; }
  .preview { flex:1; padding:20px; overflow:auto; }
  label { font-size:12px; font-weight:bold; margin-top:10px; display:block; }
  input, select {
  width:100%;
  box-sizing:border-box;
  padding:7px;
  margin-top:4px;
}
  button { width:100%; padding:10px; margin-top:12px; font-weight:bold; cursor:pointer; }
  svg { background:white; border:1px solid #ccc; }
  .box { fill:#fff; stroke:#000; stroke-width:1.6; rx:8; }
  .line { stroke:#000; stroke-width:2; fill:none; }
  text { font-size:14px; text-anchor:middle; dominant-baseline:middle; }
  .title { font-size:28px; font-weight:bold; }

  #drawioModal {
    display:none;
    position:fixed;
    inset:0;
    background:#fff;
    z-index:9999;
  }
  #drawioHeader {
    height:44px;
    background:#222;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 12px;
    font-size:14px;
  }
  #drawioFrame {
    width:100%;
    height:calc(100vh - 44px);
    border:0;
  }
  .smallBtn {
    width:auto;
    padding:7px 12px;
    margin:0;
  }
</style>
</head>

<body>
<div class="wrap">
  <div class="form">
    <h2>構成図入力</h2>

    <label>テンプレート</label>
<select id="templateType">
  <option value="ha">HA構成</option>
  <option value="single">単体構成</option>
  <option value="azure">Azure VPN構成</option>
</select>
    
    <label>案件名</label>
    <input id="project" value="サンプル案件 VSR構成図">

    <label>回線① 名称</label>
    <input id="wan1" value="メイン回線">

    <label>回線① GW</label>
    <input id="wan1gw" value="203.0.113.6">

    <label>回線② 名称</label>
    <input id="wan2" value="バックアップ回線">

    <label>回線② GW</label>
    <input id="wan2gw" value="203.0.111.6">

    <label>VSR機種</label>
    <input id="model" value="VSR n2000A 10G4C">

    <label>アクティブ機名</label>
    <input id="active" value="VSR-ACTIVE">

    <label>スタンバイ機名</label>
    <input id="standby" value="VSR-STANDBY">

    <label>WAN1 IP</label>
    <input id="wan1ip" value="203.0.113.2/29">

    <label>WAN2 IP</label>
    <input id="wan2ip" value="203.0.111.2/29">

    <label>LAN IP</label>
    <input id="lanip" value="192.168.1.254/24">

    <label>DMZ IP</label>
    <input id="dmzip" value="172.16.1.1/24">

    <label>HA IP</label>
    <input id="haip" value="10.255.255.1/30">

    <label>内部ネットワーク</label>
    <input id="lan" value="192.168.1.0/24">

    <label>公開サーバ</label>
    <input id="server" value="172.16.1.10">

    <button onclick="openDrawioEmbed()">draw.ioで直接編集</button>
    <button id="pptxBtn">PowerPoint出力</button>
    <button onclick="downloadDrawio()">draw.ioファイル保存</button>
    <button onclick="downloadSvg()">SVG出力</button>
  </div>

  <div class="preview">
    <svg id="diagram" width="1100" height="760"></svg>
  </div>
</div>

<div id="drawioModal">
  <div id="drawioHeader">
    <div>draw.io 編集画面</div>
    <button class="smallBtn" onclick="closeDrawioEmbed()">閉じる</button>
  </div>
  <iframe id="drawioFrame"></iframe>
</div>

<script>
const ids = [
  "templateType",
  "project","wan1","wan1gw","wan2","wan2gw","model","active","standby",
  "wan1ip","wan2ip","lanip","dmzip","haip","lan","server"
];

ids.forEach(id => {
  document.getElementById(id).addEventListener("input", render);
});

function v(id){ return document.getElementById(id).value || ""; }

function esc(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function box(svg,x,y,w,h,label){
  svg.innerHTML += `<rect class="box" x="${x}" y="${y}" width="${w}" height="${h}"></rect>`;
  const lines = label.split("\n");
  lines.forEach((t,i)=>{
    svg.innerHTML += `<text x="${x+w/2}" y="${y+h/2 + (i-(lines.length-1)/2)*22}">${esc(t)}</text>`;
  });
}

function cloud(svg,x,y,w,h,label){
  const d = `
    M ${x+30} ${y+h*0.55}
    C ${x+5} ${y+h*0.55}, ${x+5} ${y+h*0.25}, ${x+35} ${y+h*0.25}
    C ${x+45} ${y}, ${x+85} ${y}, ${x+100} ${y+20}
    C ${x+125} ${y-5}, ${x+170} ${y+5}, ${x+180} ${y+30}
    C ${x+215} ${y+25}, ${x+235} ${y+55}, ${x+215} ${y+75}
    C ${x+205} ${y+100}, ${x+165} ${y+105}, ${x+145} ${y+88}
    C ${x+120} ${y+110}, ${x+75} ${y+105}, ${x+65} ${y+82}
    C ${x+35} ${y+90}, ${x+10} ${y+75}, ${x+30} ${y+h*0.55}
    Z`;
  svg.innerHTML += `<path d="${d}" fill="#fff" stroke="#000" stroke-width="1.6"></path>`;
  svg.innerHTML += `<text x="${x+w/2}" y="${y+h/2+5}" style="font-size:18px;">${esc(label)}</text>`;
}

function line(svg,x1,y1,x2,y2){
  svg.innerHTML += `<path class="line" d="M${x1},${y1} L${x2},${y2}"></path>`;
}

function keyLine(svg, points){
  let d = `M${points[0][0]},${points[0][1]}`;
  for(let i=1; i<points.length; i++){
    d += ` L${points[i][0]},${points[i][1]}`;
  }
  svg.innerHTML += `<path class="line" d="${d}"></path>`;
}

  function render(){
  const type = v("templateType");

  if (type === "single") {
    renderSingle();
    return;
  }

  if (type === "azure") {
    renderAzure();
    return;
  }

  renderHa();
}
  
function renderHa(){
  const svg = document.getElementById("diagram");
  svg.innerHTML = `<text class="title" x="550" y="35">${esc(v("project"))}</text>`;

  cloud(svg, 425, 70, 250, 120, "Internet");

  box(svg, 185, 180, 210, 70, `${v("wan1")}\nGW: ${v("wan1gw")}`);
  box(svg, 705, 180, 210, 70, `${v("wan2")}\nGW: ${v("wan2gw")}`);

  box(svg, 185, 320, 210, 70, `L2スイッチ①\nWAN1収容`);
  box(svg, 705, 320, 210, 70, `L2スイッチ②\nWAN2収容`);

  box(svg, 170, 470, 300, 140, `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nWAN2: ${v("wan2ip")}\nLAN: ${v("lanip")}`);
  box(svg, 650, 470, 300, 140, `${v("standby")}\n${v("model")}\nHA: ${v("haip")}`);

  box(svg, 275, 690, 350, 70, `お客様L2スイッチ\n内部NW: ${v("lan")}`);
  box(svg, 725, 690, 250, 70, `公開サーバ\n${v("server")}`);

  keyLine(svg, [[425,130],[290,130],[290,180]]);
  keyLine(svg, [[675,130],[810,130],[810,180]]);

  line(svg,290,250,290,320);
  line(svg,810,250,810,320);

  line(svg,290,390,320,470);
  line(svg,810,390,800,470);

  line(svg,395,355,650,500);
  line(svg,705,355,470,500);

  line(svg,470,540,650,540);

  keyLine(svg, [[320,610],[320,655],[450,655],[450,690]]);
  keyLine(svg, [[800,610],[800,655],[850,655],[850,690]]);
}

  function renderSingle(){
  const svg = document.getElementById("diagram");
  svg.innerHTML = `<text class="title" x="550" y="35">${esc(v("project"))}</text>`;

  cloud(svg, 425, 70, 250, 120, "Internet");

  box(svg, 445, 210, 220, 70, `${v("wan1")}\nGW: ${v("wan1gw")}`);

  box(svg, 425, 360, 260, 130,
    `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nLAN: ${v("lanip")}`
  );

  box(svg, 380, 610, 350, 70, `お客様L2スイッチ\n内部NW: ${v("lan")}`);

  keyLine(svg, [[550,165],[550,210]]);
  line(svg,550,280,550,360);
  line(svg,550,490,550,610);
}

function renderAzure(){
  const svg = document.getElementById("diagram");
  svg.innerHTML = `<text class="title" x="550" y="35">${esc(v("project"))}</text>`;

  cloud(svg, 425, 70, 250, 120, "Internet");

  box(svg, 200, 230, 240, 80, `${v("wan1")}\nGW: ${v("wan1gw")}`);

  box(svg, 430, 390, 260, 130,
    `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nLAN: ${v("lanip")}`
  );

  box(svg, 760, 230, 240, 90, `Azure VPN Gateway\n接続先VPN`);

  box(svg, 390, 610, 350, 70, `お客様L2スイッチ\n内部NW: ${v("lan")}`);

  keyLine(svg, [[520,165],[320,165],[320,230]]);
  keyLine(svg, [[580,165],[880,165],[880,230]]);
  line(svg,320,310,500,390);
  line(svg,880,320,690,455);
  line(svg,560,520,560,610);
}
  
function mxCell(id, value, x, y, w, h, style){
  return `
    <mxCell id="${id}" value="${esc(value).replaceAll("\n","&lt;br&gt;")}" style="${style}" vertex="1" parent="1">
      <mxGeometry x="${x}" y="${y}" width="${w}" height="${h}" as="geometry"/>
    </mxCell>`;
}

function edge(id, source, target, points=""){
  return `
    <mxCell id="${id}" style="endArrow=none;html=1;rounded=0;strokeColor=#000000;" edge="1" parent="1" source="${source}" target="${target}">
      <mxGeometry relative="1" as="geometry">${points}</mxGeometry>
    </mxCell>`;
}

function generateDrawioXml(){
  const boxStyle = "rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#000000;";
  const cloudStyle = "shape=cloud;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#000000;";

  return `<?xml version="1.0" encoding="UTF-8"?>
<mxfile host="app.diagrams.net">
  <diagram name="VSR構成図">
    <mxGraphModel dx="1200" dy="800" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="0" fold="1" page="1" pageScale="1" pageWidth="1169" pageHeight="827" math="0" shadow="0">
      <root>
        <mxCell id="0"/>
        <mxCell id="1" parent="0"/>

        ${mxCell("title", v("project"), 370, 20, 420, 40, "text;html=1;strokeColor=none;fillColor=none;fontSize=28;fontStyle=1;")}
        ${mxCell("internet", "Internet", 455, 85, 250, 100, cloudStyle)}

        ${mxCell("wan1", `${v("wan1")}\nGW: ${v("wan1gw")}`, 210, 190, 220, 70, boxStyle)}
        ${mxCell("wan2", `${v("wan2")}\nGW: ${v("wan2gw")}`, 730, 190, 220, 70, boxStyle)}

        ${mxCell("l2a", "L2スイッチ①\nWAN1収容", 210, 330, 220, 70, boxStyle)}
        ${mxCell("l2b", "L2スイッチ②\nWAN2収容", 730, 330, 220, 70, boxStyle)}

        ${mxCell("active", `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nWAN2: ${v("wan2ip")}\nLAN: ${v("lanip")}`, 190, 480, 320, 140, boxStyle)}
        ${mxCell("standby", `${v("standby")}\n${v("model")}\nHA: ${v("haip")}`, 690, 480, 320, 140, boxStyle)}

        ${mxCell("customer", `お客様L2スイッチ\n内部NW: ${v("lan")}`, 330, 700, 350, 70, boxStyle)}
        ${mxCell("server", `公開サーバ\n${v("server")}`, 760, 700, 250, 70, boxStyle)}

        ${edge("e1","internet","wan1")}
        ${edge("e2","internet","wan2")}
        ${edge("e3","wan1","l2a")}
        ${edge("e4","wan2","l2b")}
        ${edge("e5","l2a","active")}
        ${edge("e6","l2b","standby")}
        ${edge("e7","l2a","standby")}
        ${edge("e8","l2b","active")}
        ${edge("e9","active","standby")}
        ${edge("e10","active","customer")}
        ${edge("e11","standby","server")}
      </root>
    </mxGraphModel>
  </diagram>
</mxfile>`;
}

function download(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadDrawio(){
  download(new Blob([generateDrawioXml()], {type:"application/xml"}), "vsr_diagram.drawio");
}

function downloadSvg(){
  const svg = document.getElementById("diagram").outerHTML;
  download(new Blob([svg], {type:"image/svg+xml"}), "vsr_diagram.svg");
}

function openDrawioEmbed(){
  const modal = document.getElementById("drawioModal");
  const frame = document.getElementById("drawioFrame");
  modal.style.display = "block";
  frame.src = "https://embed.diagrams.net/?embed=1&proto=json&spin=1&ui=min&libraries=1";
}

function closeDrawioEmbed(){
  document.getElementById("drawioModal").style.display = "none";
  document.getElementById("drawioFrame").src = "";
}

window.addEventListener("message", function(evt){
  if (!evt.data) return;

  let msg;
  try { msg = JSON.parse(evt.data); } catch(e) { return; }

  const frame = document.getElementById("drawioFrame");

  if (msg.event === "init") {
    frame.contentWindow.postMessage(JSON.stringify({
      action: "load",
      xml: generateDrawioXml()
    }), "*");
  }

  if (msg.event === "save") {
    frame.contentWindow.postMessage(JSON.stringify({
      action: "export",
      format: "xml"
    }), "*");
  }

  if (msg.event === "export") {
    download(new Blob([msg.data], {type:"application/xml"}), "vsr_diagram_edited.drawio");
  }

  if (msg.event === "exit") closeDrawioEmbed();
});

function addPptxBox(slide, x, y, w, h, text) {
  slide.addText(text, {
    x, y, w, h,
    fontSize: 10,
    color: "000000",
    align: "center",
    valign: "mid",
    fill: { color: "FFFFFF" },
    line: { color: "000000", width: 1 },
    margin: 0.05
  });
}

function addPptxLine(slide, x1, y1, x2, y2) {
  const t = 0.018;

  if (Math.abs(y1 - y2) < 0.01) {
    slide.addText("", {
      x: Math.min(x1, x2),
      y: y1,
      w: Math.abs(x2 - x1),
      h: t,
      fill: { color: "000000" },
      margin: 0
    });
  } else if (Math.abs(x1 - x2) < 0.01) {
    slide.addText("", {
      x: x1,
      y: Math.min(y1, y2),
      w: t,
      h: Math.abs(y2 - y1),
      fill: { color: "000000" },
      margin: 0
    });
  }
}

function addPptxKeyLine(slide, points) {
  for (let i = 0; i < points.length - 1; i++) {
    addPptxLine(slide, points[i][0], points[i][1], points[i + 1][0], points[i + 1][1]);
  }
}

async function downloadPptx() {
  const pptx = new PptxGenJS();
  pptx.layout = "LAYOUT_WIDE";

  const slide = pptx.addSlide();
  slide.background = { color: "FFFFFF" };

  slide.addText(v("project"), {
    x: 0.3, y: 0.2, w: 12.7, h: 0.4,
    fontSize: 22, bold: true, align: "center", color: "000000"
  });

  slide.addText("☁\nInternet", {
    x: 5.25, y: 0.8, w: 2.5, h: 0.9,
    fontSize: 18, align: "center", valign: "mid", color: "000000"
  });

  addPptxBox(slide, 2.3, 1.75, 2.4, 0.7, `${v("wan1")}\nGW: ${v("wan1gw")}`);
  addPptxBox(slide, 8.7, 1.75, 2.4, 0.7, `${v("wan2")}\nGW: ${v("wan2gw")}`);

  addPptxBox(slide, 2.3, 3.1, 2.4, 0.7, "L2スイッチ①\nWAN1収容");
  addPptxBox(slide, 8.7, 3.1, 2.4, 0.7, "L2スイッチ②\nWAN2収容");

  addPptxBox(slide, 2.1, 4.6, 3.3, 1.35,
    `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nWAN2: ${v("wan2ip")}\nLAN: ${v("lanip")}`
  );

  addPptxBox(slide, 8.0, 4.6, 3.3, 1.35,
    `${v("standby")}\n${v("model")}\nHA: ${v("haip")}`
  );

  addPptxBox(slide, 4.0, 6.75, 3.8, 0.7,
    `お客様L2スイッチ\n内部NW: ${v("lan")}`
  );

  addPptxBox(slide, 8.7, 6.75, 2.6, 0.7,
    `公開サーバ\n${v("server")}`
  );

  // Internet → 回線
  addPptxKeyLine(slide, [[5.25,1.25],[3.5,1.25],[3.5,1.75]]);
  addPptxKeyLine(slide, [[7.75,1.25],[9.9,1.25],[9.9,1.75]]);

  // 回線 → L2SW
  addPptxLine(slide, 3.5, 2.45, 3.5, 3.1);
  addPptxLine(slide, 9.9, 2.45, 9.9, 3.1);

  // L2SW → VSR 通常
  addPptxLine(slide, 3.5, 3.8, 3.5, 4.6);
  addPptxLine(slide, 9.9, 3.8, 9.9, 4.6);

  // たすき掛け：カギ線
addPptxKeyLine(slide, [[4.7,3.45],[6.0,3.45],[6.0,4.6],[8.0,4.6]]);
addPptxKeyLine(slide, [[8.7,3.45],[7.4,3.45],[7.4,4.6],[5.4,4.6]]);

  // HA
  addPptxLine(slide, 5.4, 5.25, 8.0, 5.25);

  // LAN / DMZ
  addPptxKeyLine(slide, [[3.7,5.95],[3.7,6.35],[5.9,6.35],[5.9,6.75]]);
  addPptxKeyLine(slide, [[9.65,5.95],[9.65,6.35],[10.0,6.35],[10.0,6.75]]);

  await pptx.writeFile({ fileName: "vsr_diagram.pptx" });
}

document.getElementById("pptxBtn").addEventListener("click", downloadPptx);

render();
</script>
</body>
</html>
