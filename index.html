<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>VSR構成図ジェネレーター</title>
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#f4f6f8; }
  .wrap { display:flex; height:100vh; }
  .form { width:360px; padding:20px; background:#fff; overflow:auto; box-shadow:2px 0 8px #ccc; }
  .preview { flex:1; padding:20px; overflow:auto; }
  label { font-size:12px; font-weight:bold; margin-top:10px; display:block; }
  input { width:100%; box-sizing:border-box; padding:7px; margin-top:4px; }
  button { width:100%; padding:10px; margin-top:12px; font-weight:bold; cursor:pointer; }
  svg { background:white; border:1px solid #ccc; }
  .box { fill:#fff; stroke:#333; stroke-width:1.5; rx:8; }
  .blue { fill:#e8f1ff; }
  .green { fill:#e9f8ed; }
  .yellow { fill:#fff7d6; }
  .line { stroke:#333; stroke-width:2; fill:none; marker-end:url(#arrow); }
  text { font-size:13px; text-anchor:middle; dominant-baseline:middle; }
  .title { font-size:20px; font-weight:bold; }

  #drawioModal {
    display:none;
    position:fixed;
    inset:0;
    background:#fff;
    z-index:9999;
  }
  #drawioHeader {
    height:44px;
    background:#222;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 12px;
    font-size:14px;
  }
  #drawioFrame {
    width:100%;
    height:calc(100vh - 44px);
    border:0;
  }
  .smallBtn {
    width:auto;
    padding:7px 12px;
    margin:0;
  }
</style>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>
</head>

<body>
<div class="wrap">
  <div class="form">
    <h2>構成図入力</h2>

    <label>案件名</label>
    <input id="project" value="サンプル案件 VSR構成図">

    <label>回線① 名称</label>
    <input id="wan1" value="メイン回線">

    <label>回線① GW</label>
    <input id="wan1gw" value="203.0.113.6">

    <label>回線② 名称</label>
    <input id="wan2" value="バックアップ回線">

    <label>回線② GW</label>
    <input id="wan2gw" value="203.0.111.6">

    <label>VSR機種</label>
    <input id="model" value="VSR n2000A 10G4C">

    <label>アクティブ機名</label>
    <input id="active" value="VSR-ACTIVE">

    <label>スタンバイ機名</label>
    <input id="standby" value="VSR-STANDBY">

    <label>WAN1 IP</label>
    <input id="wan1ip" value="203.0.113.2/29">

    <label>WAN2 IP</label>
    <input id="wan2ip" value="203.0.111.2/29">

    <label>LAN IP</label>
    <input id="lanip" value="192.168.1.254/24">

    <label>DMZ IP</label>
    <input id="dmzip" value="172.16.1.1/24">

    <label>HA IP</label>
    <input id="haip" value="10.255.255.1/30">

    <label>内部ネットワーク</label>
    <input id="lan" value="192.168.1.0/24">

    <label>公開サーバ</label>
    <input id="server" value="172.16.1.10">

    <button onclick="openDrawioEmbed()">draw.ioで直接編集</button>
    <button onclick="downloadPptx()">PowerPoint出力</button>
    <button onclick="downloadDrawio()">draw.ioファイル保存</button>
    <button onclick="downloadSvg()">SVG出力</button>
  </div>

  <div class="preview">
    <svg id="diagram" width="1100" height="760"></svg>
  </div>
</div>

<div id="drawioModal">
  <div id="drawioHeader">
    <div>draw.io 編集画面</div>
    <button class="smallBtn" onclick="closeDrawioEmbed()">閉じる</button>
  </div>
  <iframe id="drawioFrame"></iframe>
</div>

<script>
const ids = [
  "project","wan1","wan1gw","wan2","wan2gw","model","active","standby",
  "wan1ip","wan2ip","lanip","dmzip","haip","lan","server"
];

ids.forEach(id => {
  document.getElementById(id).addEventListener("input", render);
});

function v(id){ return document.getElementById(id).value || ""; }

function esc(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function box(svg,x,y,w,h,label,cls=""){
  svg.innerHTML += `<rect class="box ${cls}" x="${x}" y="${y}" width="${w}" height="${h}"></rect>`;
  const lines = label.split("\n");
  lines.forEach((t,i)=>{
    svg.innerHTML += `<text x="${x+w/2}" y="${y+h/2 + (i-(lines.length-1)/2)*18}">${esc(t)}</text>`;
  });
}

function line(svg,x1,y1,x2,y2){
  svg.innerHTML += `<path class="line" d="M${x1},${y1} L${x2},${y2}"></path>`;
}

function render(){
  const svg = document.getElementById("diagram");
  svg.innerHTML = `
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#333"></path>
      </marker>
    </defs>
    <text class="title" x="550" y="35">${esc(v("project"))}</text>
  `;

  box(svg, 470, 70, 160, 55, "Internet", "blue");
  box(svg, 240, 160, 210, 70, `${v("wan1")}\nGW: ${v("wan1gw")}`, "yellow");
  box(svg, 650, 160, 210, 70, `${v("wan2")}\nGW: ${v("wan2gw")}`, "yellow");
  box(svg, 230, 285, 230, 70, `L2スイッチ①\nWAN1収容`, "green");
  box(svg, 640, 285, 230, 70, `L2スイッチ②\nWAN2収容`, "green");

  box(svg, 250, 430, 260, 120, `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nWAN2: ${v("wan2ip")}\nLAN: ${v("lanip")}`, "blue");
  box(svg, 590, 430, 260, 120, `${v("standby")}\n${v("model")}\nHA: ${v("haip")}`, "blue");

  box(svg, 390, 610, 320, 70, `お客様L2スイッチ\n内部NW: ${v("lan")}`, "green");
  box(svg, 820, 610, 190, 70, `公開サーバ\n${v("server")}`, "yellow");

  line(svg,550,125,345,160);
  line(svg,550,125,755,160);
  line(svg,345,230,345,285);
  line(svg,755,230,755,285);
  line(svg,345,355,380,430);
  line(svg,755,355,720,430);
  line(svg,510,490,590,490);
  line(svg,380,550,520,610);
  line(svg,720,550,580,610);
  line(svg,510,500,820,645);
}

function mxCell(id, value, x, y, w, h, style){
  return `
    <mxCell id="${id}" value="${esc(value).replaceAll("\n","&lt;br&gt;")}" style="${style}" vertex="1" parent="1">
      <mxGeometry x="${x}" y="${y}" width="${w}" height="${h}" as="geometry"/>
    </mxCell>`;
}

function edge(id, source, target){
  return `
    <mxCell id="${id}" style="endArrow=classic;html=1;rounded=0;" edge="1" parent="1" source="${source}" target="${target}">
      <mxGeometry relative="1" as="geometry"/>
    </mxCell>`;
}

function generateDrawioXml(){
  const styleBlue = "rounded=1;whiteSpace=wrap;html=1;fillColor=#e8f1ff;strokeColor=#333333;";
  const styleGreen = "rounded=1;whiteSpace=wrap;html=1;fillColor=#e9f8ed;strokeColor=#333333;";
  const styleYellow = "rounded=1;whiteSpace=wrap;html=1;fillColor=#fff7d6;strokeColor=#333333;";

  return `<?xml version="1.0" encoding="UTF-8"?>
<mxfile host="app.diagrams.net">
  <diagram name="VSR構成図">
    <mxGraphModel dx="1200" dy="800" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1169" pageHeight="827" math="0" shadow="0">
      <root>
        <mxCell id="0"/>
        <mxCell id="1" parent="0"/>

        ${mxCell("title", v("project"), 430, 20, 300, 40, "text;html=1;strokeColor=none;fillColor=none;fontSize=20;fontStyle=1;")}

        ${mxCell("internet", "Internet", 500, 80, 160, 55, styleBlue)}
        ${mxCell("wan1", `${v("wan1")}\nGW: ${v("wan1gw")}`, 250, 170, 210, 70, styleYellow)}
        ${mxCell("wan2", `${v("wan2")}\nGW: ${v("wan2gw")}`, 700, 170, 210, 70, styleYellow)}

        ${mxCell("l2a", "L2スイッチ①\nWAN1収容", 240, 300, 230, 70, styleGreen)}
        ${mxCell("l2b", "L2スイッチ②\nWAN2収容", 690, 300, 230, 70, styleGreen)}

        ${mxCell("active", `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nWAN2: ${v("wan2ip")}\nLAN: ${v("lanip")}`, 260, 450, 270, 125, styleBlue)}
        ${mxCell("standby", `${v("standby")}\n${v("model")}\nHA: ${v("haip")}`, 630, 450, 270, 125, styleBlue)}

        ${mxCell("customer", `お客様L2スイッチ\n内部NW: ${v("lan")}`, 410, 650, 340, 70, styleGreen)}
        ${mxCell("server", `公開サーバ\n${v("server")}`, 850, 650, 200, 70, styleYellow)}

        ${edge("e1","internet","wan1")}
        ${edge("e2","internet","wan2")}
        ${edge("e3","wan1","l2a")}
        ${edge("e4","wan2","l2b")}
        ${edge("e5","l2a","active")}
        ${edge("e6","l2b","standby")}
        ${edge("e7","active","standby")}
        ${edge("e8","active","customer")}
        ${edge("e9","standby","customer")}
        ${edge("e10","active","server")}
      </root>
    </mxGraphModel>
  </diagram>
</mxfile>`;
}

function download(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadDrawio(){
  const xml = generateDrawioXml();
  download(new Blob([xml], {type:"application/xml"}), "vsr_diagram.drawio");
}

function downloadSvg(){
  const svg = document.getElementById("diagram").outerHTML;
  download(new Blob([svg], {type:"image/svg+xml"}), "vsr_diagram.svg");
}

function openDrawioEmbed(){
  const modal = document.getElementById("drawioModal");
  const frame = document.getElementById("drawioFrame");

  modal.style.display = "block";

  frame.src = "https://embed.diagrams.net/?embed=1&proto=json&spin=1&ui=min&libraries=1";
}

function closeDrawioEmbed(){
  document.getElementById("drawioModal").style.display = "none";
  document.getElementById("drawioFrame").src = "";
}

window.addEventListener("message", function(evt){
  if (!evt.data) return;

  let msg;
  try {
    msg = JSON.parse(evt.data);
  } catch(e) {
    return;
  }

  const frame = document.getElementById("drawioFrame");

  if (msg.event === "init") {
    frame.contentWindow.postMessage(JSON.stringify({
      action: "load",
      xml: generateDrawioXml()
    }), "*");
  }

  if (msg.event === "save") {
    frame.contentWindow.postMessage(JSON.stringify({
      action: "export",
      format: "xml"
    }), "*");
  }

  if (msg.event === "export") {
    download(new Blob([msg.data], {type:"application/xml"}), "vsr_diagram_edited.drawio");
  }

  if (msg.event === "exit") {
    closeDrawioEmbed();
  }
});

render();
  function addPptxBox(slide, x, y, w, h, text, fill) {
  slide.addShape(pptx.ShapeType.roundRect, {
    x, y, w, h,
    fill: { color: fill },
    line: { color: "333333", width: 1 },
    radius: 0.12
  });

  slide.addText(text, {
    x, y: y + 0.05, w, h,
    fontSize: 10,
    color: "000000",
    align: "center",
    valign: "mid",
    breakLine: false,
    fit: "shrink"
  });
}

function addPptxLine(slide, x1, y1, x2, y2) {
  slide.addShape(pptx.ShapeType.line, {
    x: x1,
    y: y1,
    w: x2 - x1,
    h: y2 - y1,
    line: {
      color: "333333",
      width: 1.2,
      beginArrowType: "none",
      endArrowType: "triangle"
    }
  });
}

function downloadPptx() {
  const pptx = new PptxGenJS();

  pptx.layout = "LAYOUT_WIDE";
  pptx.author = "VSR Diagram Generator";
  pptx.subject = "VSR構成図";
  pptx.title = v("project");
  pptx.company = "VarioSecure";

  const slide = pptx.addSlide();
  slide.background = { color: "FFFFFF" };

  slide.addText(v("project"), {
    x: 0.3,
    y: 0.2,
    w: 12.7,
    h: 0.4,
    fontSize: 18,
    bold: true,
    align: "center",
    color: "000000"
  });

  addPptxBox(slide, 5.55, 0.85, 1.8, 0.55, "Internet", "E8F1FF");

  addPptxBox(slide, 2.7, 1.75, 2.3, 0.75, `${v("wan1")}\nGW: ${v("wan1gw")}`, "FFF7D6");
  addPptxBox(slide, 8.2, 1.75, 2.3, 0.75, `${v("wan2")}\nGW: ${v("wan2gw")}`, "FFF7D6");

  addPptxBox(slide, 2.65, 3.05, 2.4, 0.75, "L2スイッチ①\nWAN1収容", "E9F8ED");
  addPptxBox(slide, 8.15, 3.05, 2.4, 0.75, "L2スイッチ②\nWAN2収容", "E9F8ED");

  addPptxBox(
    slide,
    2.6,
    4.55,
    3.0,
    1.25,
    `${v("active")}\n${v("model")}\nWAN1: ${v("wan1ip")}\nWAN2: ${v("wan2ip")}\nLAN: ${v("lanip")}`,
    "E8F1FF"
  );

  addPptxBox(
    slide,
    7.6,
    4.55,
    3.0,
    1.25,
    `${v("standby")}\n${v("model")}\nHA: ${v("haip")}`,
    "E8F1FF"
  );

  addPptxBox(
    slide,
    4.65,
    6.45,
    3.8,
    0.75,
    `お客様L2スイッチ\n内部NW: ${v("lan")}`,
    "E9F8ED"
  );

  addPptxBox(
    slide,
    9.7,
    6.45,
    2.2,
    0.75,
    `公開サーバ\n${v("server")}`,
    "FFF7D6"
  );

  addPptxLine(slide, 6.45, 1.4, 3.85, 1.75);
  addPptxLine(slide, 6.45, 1.4, 9.35, 1.75);

  addPptxLine(slide, 3.85, 2.5, 3.85, 3.05);
  addPptxLine(slide, 9.35, 2.5, 9.35, 3.05);

  addPptxLine(slide, 3.85, 3.8, 4.1, 4.55);
  addPptxLine(slide, 9.35, 3.8, 9.1, 4.55);

  addPptxLine(slide, 5.6, 5.15, 7.6, 5.15);

  addPptxLine(slide, 4.1, 5.8, 5.6, 6.45);
  addPptxLine(slide, 9.1, 5.8, 7.4, 6.45);

  addPptxLine(slide, 5.6, 5.2, 9.7, 6.8);

  pptx.writeFile({
    fileName: "vsr_diagram.pptx"
  });
}
</script>
</body>
</html>
